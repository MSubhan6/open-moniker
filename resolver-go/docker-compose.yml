version: '3.8'

services:
  # PostgreSQL for telemetry storage
  postgres:
    image: postgres:16-alpine
    container_name: moniker-telemetry-db
    environment:
      POSTGRES_DB: moniker_telemetry
      POSTGRES_USER: telemetry
      POSTGRES_PASSWORD: ${TELEMETRY_DB_PASSWORD:-telemetry_dev_password}
      # Performance tuning for write-heavy workload
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_WORK_MEM: 16MB
      POSTGRES_MAINTENANCE_WORK_MEM: 64MB
    ports:
      - "5432:5432"
    volumes:
      # Persistent data
      - telemetry_data:/var/lib/postgresql/data
      # Initialize schema on first run
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # Custom PostgreSQL config
      - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c checkpoint_timeout=15min
      -c wal_buffers=16MB
      -c effective_cache_size=512MB
      -c maintenance_work_mem=64MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=4
      -c max_parallel_workers_per_gather=2
      -c max_parallel_workers=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry -d moniker_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telemetry

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: moniker-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@moniker.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - telemetry
    profiles:
      - admin  # Only start with: docker-compose --profile admin up

  # Grafana for telemetry dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: moniker-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-postgresql-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - postgres
    networks:
      - telemetry
    profiles:
      - monitoring  # Only start with: docker-compose --profile monitoring up

volumes:
  telemetry_data:
    driver: local
  pgadmin_data:
    driver: local
  grafana_data:
    driver: local

networks:
  telemetry:
    driver: bridge

# Usage:
#
# Start PostgreSQL only (for development):
#   docker-compose up -d
#
# Start with pgAdmin (for database management):
#   docker-compose --profile admin up -d
#
# Start with Grafana (for monitoring):
#   docker-compose --profile monitoring up -d
#
# Start everything:
#   docker-compose --profile admin --profile monitoring up -d
#
# View logs:
#   docker-compose logs -f postgres
#
# Connect to PostgreSQL:
#   docker-compose exec postgres psql -U telemetry -d moniker_telemetry
#
# Stop everything:
#   docker-compose down
#
# Stop and remove volumes (DELETE ALL DATA):
#   docker-compose down -v
#
# Connection string for resolver:
#   postgres://telemetry:telemetry_dev_password@localhost:5432/moniker_telemetry?sslmode=disable
