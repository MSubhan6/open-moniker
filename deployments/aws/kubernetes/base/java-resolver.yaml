apiVersion: v1
kind: ConfigMap
metadata:
  name: java-resolver-config
  namespace: moniker
data:
  application.yaml: |
    server:
      port: 8080
    moniker:
      resolver-name: ${RESOLVER_NAME}
      region: ${AWS_REGION}
      az: ${AWS_AZ}
      telemetry:
        enabled: true
        sink-type: postgres
        batch-size: 100
        flush-interval-seconds: 5.0
        max-queue-size: 10000
        sink-config:
          host: ${TELEMETRY_DB_HOST}
          port: 5432
          database: moniker_telemetry
          username: ${TELEMETRY_DB_USER}
          pool-size: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-resolver
  namespace: moniker
  labels:
    app: moniker-resolver
    language: java
    component: resolver
spec:
  replicas: 1  # Override in overlays
  selector:
    matchLabels:
      app: moniker-resolver
      language: java
  template:
    metadata:
      labels:
        app: moniker-resolver
        language: java
        component: resolver
    spec:
      serviceAccountName: moniker-resolver
      containers:
      - name: resolver
        image: PLACEHOLDER_IMAGE  # Override in overlays
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: RESOLVER_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: AWS_REGION
          value: PLACEHOLDER_REGION  # Override in overlays
        - name: AWS_AZ
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: TELEMETRY_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: database-config
              key: telemetry_host
        - name: TELEMETRY_DB_USER
          value: telemetry
        - name: TELEMETRY_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-secrets
              key: telemetry_password
        - name: CATALOG_PATH
          value: /config/catalog.yaml
        - name: DOMAINS_PATH
          value: /config/domains.yaml
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication"
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        - name: app-config
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            memory: "768Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
      volumes:
      - name: config
        configMap:
          name: moniker-catalog
      - name: app-config
        configMap:
          name: java-resolver-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - moniker-resolver
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: java-resolver
  namespace: moniker
  labels:
    app: moniker-resolver
    language: java
spec:
  type: LoadBalancer
  sessionAffinity: None
  selector:
    app: moniker-resolver
    language: java
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: moniker-resolver
  namespace: moniker
  annotations:
    eks.amazonaws.com/role-arn: PLACEHOLDER_ROLE_ARN  # Override in overlays
