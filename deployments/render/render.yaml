services:
  # Python Admin Service - Port 8050 (Management + Resolution + Dashboard)
  - type: web
    name: moniker-admin
    runtime: python
    region: oregon
    plan: starter
    branch: feature/java-resolver-implementation
    rootDir: .
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      PYTHONPATH=/opt/render/project/src \
      uvicorn moniker_svc.main:app --host 0.0.0.0 --port $PORT --log-level info
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: CONFIG_FILE
        value: /opt/render/project/sample_config.yaml
      - key: CATALOG_FILE
        value: /opt/render/project/sample_catalog.yaml
      - key: TELEMETRY_DB_TYPE
        value: sqlite
      - key: TELEMETRY_DB_PATH
        value: /tmp/telemetry.db
      - key: PROJECT_NAME
        value: Open Moniker (Render)
    healthCheckPath: /health

  # Java Resolver Service - High Performance
  - type: web
    name: moniker-resolver-java
    runtime: docker
    region: oregon
    plan: starter
    branch: feature/java-resolver-implementation
    rootDir: .
    dockerfilePath: ./deployments/render/Dockerfile.java
    dockerContext: .
    envVars:
      - key: SERVER_PORT
        value: "8054"
      - key: CONFIG_FILE
        value: /app/sample_config.yaml
      - key: CATALOG_FILE
        value: /app/sample_catalog.yaml
      - key: MONIKER_TELEMETRY_ENABLED
        value: "true"
      - key: TELEMETRY_SINK_TYPE
        value: postgres
      - key: TELEMETRY_DB_HOST
        fromDatabase:
          name: moniker-telemetry
          property: host
      - key: TELEMETRY_DB_PORT
        fromDatabase:
          name: moniker-telemetry
          property: port
      - key: TELEMETRY_DB_NAME
        fromDatabase:
          name: moniker-telemetry
          property: database
      - key: TELEMETRY_DB_USER
        fromDatabase:
          name: moniker-telemetry
          property: user
      - key: TELEMETRY_DB_PASSWORD
        fromDatabase:
          name: moniker-telemetry
          property: password
      - key: RESOLVER_NAME
        value: render-java-1
      - key: AWS_REGION
        value: us-west-2
      - key: AWS_AZ
        value: render
    healthCheckPath: /health

databases:
  # PostgreSQL for telemetry
  - name: moniker-telemetry
    databaseName: moniker_telemetry
    user: moniker
    region: oregon
    plan: starter
    ipAllowList: []
