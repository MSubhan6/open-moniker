<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moniker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <style>
        /* Corporate Design Tokens */
        :root {
            --font-sans: Arial, Helvetica, sans-serif;
            --c-navy: #022D5E;
            --c-gray: #53565A;
            --c-peacock: #005587;
            --c-green: #009639;
            --c-red: #D0002B;
            --c-yellow: #F2A900;
            --c-wine: #6D2077;
            --c-olive: #789D4A;
            --color-bg: #f8f9fa;
            --color-surface: #ffffff;
            --color-text: #111111;
            --border: rgba(83, 86, 90, 0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
        }
        header {
            background: var(--c-navy);
            color: #fff;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
        header span { font-size: 0.8rem; opacity: 0.65; margin-left: auto; }
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
        .card {
            background: var(--color-surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px 22px;
        }
        .card.full-width { grid-column: 1 / -1; }
        .card-title {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--c-gray);
            margin-bottom: 16px;
        }
        /* Stat pill row */
        .stat-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .stat-pill {
            border-radius: 4px;
            padding: 8px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }
        .stat-pill .label {
            font-size: 0.68rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 3px;
        }
        .pill-total    { background: var(--c-navy);    color: #fff; }
        .pill-active   { background: var(--c-green);   color: #fff; }
        .pill-pending  { background: var(--c-yellow);  color: #fff; }
        .pill-draft    { background: var(--c-gray);    color: #fff; }
        .pill-approved { background: var(--c-olive);   color: #fff; }
        .pill-deprecated { background: var(--c-wine);  color: #fff; }
        .pill-archived { background: #888;             color: #fff; }
        .pill-rejected { background: var(--c-red);     color: #fff; }
        .pill-default  { background: var(--c-peacock); color: #fff; }
        /* Domain table */
        .domain-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 4px 16px;
            align-items: center;
        }
        .domain-name { font-size: 0.88rem; color: var(--c-peacock); font-weight: 500; }
        .domain-bar-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .domain-bar {
            height: 8px;
            background: var(--c-peacock);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .domain-count { font-size: 0.82rem; color: var(--c-gray); min-width: 28px; text-align: right; }
        .domain-row {
            display: contents;
        }
        /* Recent requests table */
        table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
        th {
            text-align: left;
            padding: 6px 10px;
            background: var(--color-bg);
            color: var(--c-gray);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            border-bottom: 1px solid var(--border);
        }
        td { padding: 8px 10px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: lowercase;
        }
        .badge-pending_review { background: #FFF3CD; color: #8a6200; }
        .badge-approved       { background: #D4EDDA; color: #155724; }
        .badge-rejected       { background: #F8D7DA; color: #721c24; }
        .badge-draft          { background: #e9ecef; color: #495057; }
        .badge-active         { background: #D4EDDA; color: #155724; }
        .badge-default        { background: #e9ecef; color: #495057; }
        /* Placeholder */
        .placeholder {
            color: var(--c-gray);
            font-size: 0.85rem;
            font-style: italic;
            padding: 8px 0;
        }
        .empty-state {
            color: var(--c-gray);
            font-size: 0.83rem;
            text-align: center;
            padding: 20px 0;
            opacity: 0.7;
        }
        /* Error banner */
        #error-banner {
            display: none;
            background: #F8D7DA;
            color: #721c24;
            padding: 10px 20px;
            font-size: 0.85rem;
            text-align: center;
        }
        /* Refresh hint */
        #refresh-hint {
            font-size: 0.72rem;
            color: var(--c-gray);
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <h1>Moniker Dashboard</h1>
    <span id="refresh-hint">Auto-refreshes every 30 s</span>
</header>

<div id="error-banner">Failed to load stats — is the service running?</div>

<main>
    <!-- Catalog Summary -->
    <div class="card">
        <div class="card-title">Moniker Catalog</div>
        <div class="stat-row" id="catalog-stats">
            <div class="empty-state">Loading…</div>
        </div>
    </div>

    <!-- Request Queue -->
    <div class="card">
        <div class="card-title">Request Queue</div>
        <div class="stat-row" id="request-stats">
            <div class="empty-state">Loading…</div>
        </div>
    </div>

    <!-- Domain Breakdown -->
    <div class="card">
        <div class="card-title">Active Monikers by Domain</div>
        <div id="domain-breakdown" class="domain-grid">
            <div class="empty-state" style="grid-column:1/-1">Loading…</div>
        </div>
    </div>

    <!-- Recent Requests -->
    <div class="card">
        <div class="card-title">Recent Requests</div>
        <div id="recent-requests">
            <div class="empty-state">Loading…</div>
        </div>
    </div>

    <!-- Live Telemetry -->
    <div class="card full-width">
        <div class="card-title">Live Telemetry <span id="telemetry-status" style="float:right; font-size:0.7rem; font-weight:400; color:var(--c-gray);">⚪ Connecting...</span></div>
        <canvas id="rpsChart" style="max-height:200px; margin-bottom:20px;"></canvas>
    </div>

    <div class="card">
        <div class="card-title">Latency (p95)</div>
        <canvas id="latencyChart" style="max-height:180px;"></canvas>
    </div>

    <div class="card">
        <div class="card-title">Top Monikers (Last Hour)</div>
        <div id="topMonikers">
            <div class="empty-state">Loading...</div>
        </div>
    </div>
</main>

<script>
    const PILL_CLASS = {
        total:          'pill-total',
        active:         'pill-active',
        pending_review: 'pill-pending',
        draft:          'pill-draft',
        approved:       'pill-approved',
        deprecated:     'pill-deprecated',
        archived:       'pill-archived',
        rejected:       'pill-rejected',
    };

    function pillClass(key) {
        return PILL_CLASS[key] || 'pill-default';
    }

    function badgeClass(status) {
        return 'badge badge-' + (status in {'pending_review':1,'approved':1,'rejected':1,'draft':1,'active':1} ? status : 'default');
    }

    function fmtDate(iso) {
        if (!iso) return '—';
        try {
            const d = new Date(iso);
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        } catch (_) { return iso; }
    }

    function renderCatalog(catalog) {
        const el = document.getElementById('catalog-stats');
        if (!catalog) { el.innerHTML = '<div class="empty-state">No data</div>'; return; }

        const pills = [];
        pills.push(`<div class="stat-pill pill-total"><span>${catalog.total}</span><span class="label">total</span></div>`);
        for (const [k, v] of Object.entries(catalog.by_status || {})) {
            pills.push(`<div class="stat-pill ${pillClass(k)}"><span>${v}</span><span class="label">${k.replace('_', ' ')}</span></div>`);
        }
        el.innerHTML = pills.join('');
    }

    function renderRequests(requests) {
        const el = document.getElementById('request-stats');
        if (!requests || !requests.by_status || Object.keys(requests.by_status).length === 0) {
            el.innerHTML = '<div class="empty-state">No requests yet</div>';
            return;
        }
        const pills = Object.entries(requests.by_status).map(([k, v]) =>
            `<div class="stat-pill ${pillClass(k)}"><span>${v}</span><span class="label">${k.replace('_', ' ')}</span></div>`
        );
        el.innerHTML = pills.join('');
    }

    function renderDomains(catalog) {
        const el = document.getElementById('domain-breakdown');
        const domains = catalog && catalog.by_domain ? catalog.by_domain : {};
        const entries = Object.entries(domains);
        if (entries.length === 0) {
            el.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No active monikers</div>';
            return;
        }
        const max = Math.max(...entries.map(([, v]) => v), 1);
        el.innerHTML = entries.map(([name, count]) => {
            const pct = Math.round((count / max) * 100);
            return `
                <div class="domain-name">${name}</div>
                <div class="domain-bar-wrap">
                    <div class="domain-bar" style="width:${pct}%"></div>
                    <span class="domain-count">${count}</span>
                </div>`;
        }).join('');
    }

    function renderRecent(requests) {
        const el = document.getElementById('recent-requests');
        const recent = requests && requests.recent ? requests.recent : [];
        if (recent.length === 0) {
            el.innerHTML = '<div class="empty-state">No requests yet</div>';
            return;
        }
        const rows = recent.map(r => `
            <tr>
                <td><code style="font-size:0.8rem">${r.request_id}</code></td>
                <td>${r.path}</td>
                <td><span class="${badgeClass(r.status)}">${r.status.replace('_', ' ')}</span></td>
                <td style="color:var(--c-gray)">${fmtDate(r.created_at)}</td>
            </tr>`).join('');
        el.innerHTML = `
            <table>
                <thead><tr><th>ID</th><th>Path</th><th>Status</th><th>Date</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    async function loadStats() {
        try {
            const res = await fetch('/dashboard/api/stats');
            if (!res.ok) throw new Error(res.status);
            const data = await res.json();
            document.getElementById('error-banner').style.display = 'none';
            renderCatalog(data.catalog);
            renderRequests(data.requests);
            renderDomains(data.catalog);
            renderRecent(data.requests);
        } catch (err) {
            document.getElementById('error-banner').style.display = 'block';
            console.error('Dashboard fetch failed:', err);
        }
    }

    loadStats();
    setInterval(loadStats, 30000);

    // ========== LIVE TELEMETRY ==========

    let ws = null;
    let rpsChart = null;
    let latencyChart = null;
    const MAX_POINTS = 60;
    const COLORS = {
        'local-dev': 'var(--c-peacock)',
        'local-uat': 'var(--c-olive)',
        'us-east-1a': 'var(--c-peacock)',
        'us-east-1b': 'var(--c-green)',
        'us-east-1c': 'var(--c-wine)',
        'us-west-2a': 'var(--c-red)',
        'us-west-2b': 'var(--c-yellow)',
        'us-west-2c': 'var(--c-olive)',
    };

    function getResolverColor(id) {
        return COLORS[id] || 'var(--c-gray)';
    }

    function initTelemetryCharts() {
        const chartOptions = {
            responsive: true,
            maintainAspectRatio: true,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { beginAtZero: true, ticks: { font: { size: 10 } } }
            }
        };

        rpsChart = new Chart(document.getElementById('rpsChart'), {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, title: { display: true, text: 'Requests/Second' } } } }
        });

        latencyChart = new Chart(document.getElementById('latencyChart'), {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { ...chartOptions, scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, title: { display: true, text: 'Milliseconds' } } } }
        });
    }

    function updateTelemetryCharts(resolvers, timestamp) {
        const time = new Date(timestamp).toLocaleTimeString();

        // Update RPS
        rpsChart.data.labels.push(time);
        if (rpsChart.data.labels.length > MAX_POINTS) rpsChart.data.labels.shift();

        resolvers.forEach(r => {
            let ds = rpsChart.data.datasets.find(d => d.label === r.resolver_id);
            if (!ds) {
                ds = {
                    label: r.resolver_id,
                    data: [],
                    borderColor: getResolverColor(r.resolver_id),
                    backgroundColor: getResolverColor(r.resolver_id) + '20',
                    tension: 0.3,
                    fill: true,
                    borderWidth: 2
                };
                rpsChart.data.datasets.push(ds);
            }
            ds.data.push(r.rps);
            if (ds.data.length > MAX_POINTS) ds.data.shift();
        });
        rpsChart.update();

        // Update Latency (reuse same labels)
        latencyChart.data.labels = [...rpsChart.data.labels];
        resolvers.forEach(r => {
            let ds = latencyChart.data.datasets.find(d => d.label === r.resolver_id);
            if (!ds) {
                ds = {
                    label: r.resolver_id,
                    data: [],
                    borderColor: getResolverColor(r.resolver_id),
                    backgroundColor: getResolverColor(r.resolver_id) + '20',
                    tension: 0.3,
                    fill: true,
                    borderWidth: 2
                };
                latencyChart.data.datasets.push(ds);
            }
            ds.data.push(r.p95_latency_ms);
            if (ds.data.length > MAX_POINTS) ds.data.shift();
        });
        latencyChart.update();
    }

    async function updateTopMonikers() {
        try {
            const res = await fetch('/dashboard/api/top-monikers?hours=1&limit=5');
            const data = await res.json();
            const el = document.getElementById('topMonikers');

            if (data.length === 0) {
                el.innerHTML = '<div class="empty-state">No data available</div>';
                return;
            }

            const rows = data.map(m => `
                <tr>
                    <td style="font-size:0.82rem">${m.moniker}</td>
                    <td style="text-align:right; color:var(--c-gray)">${m.count}</td>
                    <td style="text-align:right; color:var(--c-gray); font-size:0.8rem">${m.avg_latency_ms.toFixed(1)}ms</td>
                </tr>`).join('');

            el.innerHTML = `
                <table style="font-size:0.84rem">
                    <thead><tr><th>Moniker</th><th style="text-align:right">Count</th><th style="text-align:right">Latency</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>`;
        } catch (err) {
            console.error('Failed to fetch top monikers:', err);
        }
    }

    function connectTelemetryWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/dashboard/live`;

        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById('telemetry-status').innerHTML = '🟢 Connected';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            updateTelemetryCharts(data.resolvers, data.timestamp);
        };

        ws.onerror = () => {
            document.getElementById('telemetry-status').innerHTML = '🔴 Error';
        };

        ws.onclose = () => {
            document.getElementById('telemetry-status').innerHTML = '⚪ Reconnecting...';
            setTimeout(connectTelemetryWebSocket, 3000);
        };
    }

    // Initialize telemetry
    initTelemetryCharts();
    connectTelemetryWebSocket();
    updateTopMonikers();
    setInterval(updateTopMonikers, 10000);
</script>
</body>
</html>
