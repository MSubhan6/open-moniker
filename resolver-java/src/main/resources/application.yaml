# Spring Boot Configuration for Moniker Resolver
spring:
  application:
    name: moniker-resolver-java

  # Enable virtual threads (Java 21)
  threads:
    virtual:
      enabled: true

  # JSON configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      indent_output: false
      write_dates_as_timestamps: false

  # Disable unnecessary auto-configurations
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Server configuration
server:
  port: ${PORT:8054}
  tomcat:
    threads:
      max: 1000           # Allow many threads (virtual threads are lightweight)
      min-spare: 50
    max-connections: 10000   # High connection limit
    accept-count: 1000       # Queue size for pending connections
    connection-timeout: 5s
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain

# Moniker-specific configuration
moniker:
  project-name: ${PROJECT_NAME:Open Moniker}
  config-file: ${CONFIG_FILE:../config.yaml}
  catalog-file: ${CATALOG_FILE:../catalog.yaml}

  # Resolver identity (for telemetry)
  resolver-name: ${RESOLVER_NAME:local-dev}
  region: ${AWS_REGION:local}
  az: ${AWS_AZ:local}

  # Telemetry configuration
  telemetry:
    enabled: ${TELEMETRY_ENABLED:false}
    sink-type: ${TELEMETRY_SINK_TYPE:console}  # console, sqlite, postgres
    batch-size: ${TELEMETRY_BATCH_SIZE:100}
    flush-interval-seconds: ${TELEMETRY_FLUSH_INTERVAL:5.0}
    max-queue-size: ${TELEMETRY_MAX_QUEUE_SIZE:10000}

    # Sink-specific configuration
    sink-config:
      # SQLite configuration (local development)
      db-path: ${TELEMETRY_DB_PATH:./telemetry.db}

      # PostgreSQL configuration (production)
      host: ${TELEMETRY_DB_HOST:localhost}
      port: ${TELEMETRY_DB_PORT:5432}
      database: ${TELEMETRY_DB_NAME:moniker_telemetry}
      username: ${TELEMETRY_DB_USER:telemetry}
      password: ${TELEMETRY_DB_PASSWORD:}
      pool-size: ${TELEMETRY_DB_POOL_SIZE:10}

# Logging
logging:
  level:
    root: INFO
    com.ganizanisitara.moniker.resolver: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
